    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background:#0b1024; color:#eef3ff; }
      .ticker { position: fixed; top:0; width:100%; overflow:hidden; border-bottom:1px solid #ffffff33; background:#00000066; }
      .ticker span { display:inline-block; white-space:nowrap; padding:10px 0; color:#7be8ff; font-family: monospace; animation: move 18s linear infinite; }
      @keyframes move { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
      .app { height:100%; padding-top:45px; display:grid; grid-template-rows: 1fr 80px; }
      .slide { display:none; place-items:center; height:100%; padding:20px; }
      .slide.active { display:grid; }
      .panel { width:min(1000px, 95vw); background:#ffffff12; border:1px solid #ffffff30; border-radius:16px; padding:20px; }
      .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
      .grid img { width:100%; height:140px; object-fit:cover; border-radius:10px; }
      .controls { display:flex; justify-content:center; align-items:center; gap:10px; }
      button { border:0; border-radius:999px; padding:10px 16px; font-weight:700; cursor:pointer; }
